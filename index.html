function renderTodoPomodoro(root) {
  if(!D.skillTodo) D.skillTodo={tasks:[],pomodoroMins:25,completedSessions:0,stats:{totalDone:0,totalTime:0,streak:0,lastDate:''}};

  const activeTask = pomodoroTaskId ? D.skillTodo.tasks.find(t=>t.id===pomodoroTaskId) : null;

  const hdr=el('div','');
  hdr.style.cssText='background:linear-gradient(135deg,#1a1a2e,#0f3460);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center;';
  hdr.innerHTML=`<div style="font-size:12px;font-weight:800;color:rgba(150,200,255,0.7);margin-bottom:4px;">🍅 POMODORO FOCUS TIMER</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.5);">${activeTask?'Task: <b style="color:#64b5f6;">'+activeTask.title+'</b>':'Koi task select nahi hua'}</div>`;
  root.appendChild(hdr);

  // Timer settings
  const settCard=el('div','todo-card');
  const sl=el('label','field-label'); sl.textContent='⚙️ Session Length (minutes)';
  settCard.appendChild(sl);
  const sesRow=el('div',''); sesRow.style.cssText='display:flex;gap:8px;margin-bottom:10px;';
  [15,20,25,30,45].forEach(m=>{
    const mb=el('button','');
    mb.style.cssText=`flex:1;padding:8px 4px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;border:2px solid;font-family:inherit;transition:all 0.18s;${D.skillTodo.pomodoroMins===m?'background:#0f3460;color:#fff;border-color:#0f3460;':'background:#f0f4ff;color:#0f3460;border-color:#c5d8ff;'}`;
    mb.textContent=m+'m';
    mb.onclick=()=>{ D.skillTodo.pomodoroMins=m; if(!pomodoroActive){ pomodoroLeft=m*60; } save(); showTab('skilltodo'); };
    sesRow.appendChild(mb);
  });
  settCard.appendChild(sesRow);

  // Select task dropdown
  if(D.skillTodo.tasks.filter(t=>!t.done).length){
    const tl=el('label','field-label'); tl.textContent='📋 Task Select Karo';
    const ts=document.createElement('select');
    ts.style.cssText='width:100%;border:1.5px solid #c5d8ff;border-radius:9px;padding:9px;font-size:12px;font-family:inherit;background:#f0f4ff;';
    const blank=document.createElement('option'); blank.value=''; blank.textContent='-- Task choose karo --'; ts.appendChild(blank);
    D.skillTodo.tasks.filter(t=>!t.done).forEach(t=>{ const o=document.createElement('option'); o.value=t.id; o.textContent=t.title; ts.appendChild(o); });
    ts.value=pomodoroTaskId||'';
    ts.addEventListener('change',()=>{ pomodoroTaskId=ts.value||null; });
    settCard.appendChild(tl); settCard.appendChild(ts);
  }
  root.appendChild(settCard);

  // Timer display
  const timerCard=el('div','todo-card'); timerCard.style.cssText='text-align:center;padding:20px 14px;';
  if(!pomodoroActive && !pomodoroLeft) pomodoroLeft = D.skillTodo.pomodoroMins*60;
  const totalSecs = D.skillTodo.pomodoroMins*60;
  const elapsed = totalSecs - pomodoroLeft;
  const ringPct = (elapsed/totalSecs)*100;
  const mins=Math.floor(pomodoroLeft/60).toString().padStart(2,'0');
  const secs=(pomodoroLeft%60).toString().padStart(2,'0');
  const circumference = 2*Math.PI*54;

  timerCard.innerHTML=`
    <div class="pomo-ring ${pomodoroActive?'pomo-active':''}">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="54" fill="none" stroke="#e0e8ff" stroke-width="8"/>
        <circle cx="60" cy="60" r="54" fill="none" stroke="${pomodoroActive?'#1976d2':'#64b5f6'}" stroke-width="8"
          stroke-dasharray="${circumference}" stroke-dashoffset="${circumference*(1-ringPct/100)}"
          stroke-linecap="round" id="pomo-arc" style="transition:stroke-dashoffset 0.8s ease;"/>
      </svg>
      <div class="pomo-center">
        <div style="font-size:28px;font-weight:900;color:#0f3460;" id="pomo-time">${mins}:${secs}</div>
        <div style="font-size:9px;color:#aaa;font-weight:700;">${pomodoroActive?'FOCUS':'READY'}</div>
      </div>
    </div>
    <div style="font-size:11px;color:#888;margin-top:8px;">🍅 Sessions today: <b style="color:#0f3460;">${D.skillTodo.completedSessions||0}</b></div>
  `;

  // Control buttons
  const ctrlRow=el('div',''); ctrlRow.style.cssText='display:flex;gap:10px;justify-content:center;margin-top:14px;';

  if(!pomodoroActive){
    const startB=btn('▶ Start Focus','btn btn-primary',()=>{
      pomodoroActive=true;
      if(!pomodoroLeft) pomodoroLeft=D.skillTodo.pomodoroMins*60;
      pomodoroInterval=setInterval(()=>{
        pomodoroLeft--;
        const m2=Math.floor(pomodoroLeft/60).toString().padStart(2,'0');
        const s2=(pomodoroLeft%60).toString().padStart(2,'0');
        const te=document.getElementById('pomo-time');
        if(te) te.textContent=m2+':'+s2;
        const arc=document.getElementById('pomo-arc');
        const el2=totalSecs-pomodoroLeft; const rp=(el2/totalSecs)*100;
        if(arc) arc.style.strokeDashoffset=circumference*(1-rp/100);
        if(pomodoroLeft<=0){
          clearInterval(pomodoroInterval); pomodoroActive=false; pomodoroLeft=0;
          D.skillTodo.completedSessions=(D.skillTodo.completedSessions||0)+1;
          if(pomodoroTaskId){
            const pt=D.skillTodo.tasks.find(x=>x.id===pomodoroTaskId);
            if(pt){ pt.pomodoroSessions=(pt.pomodoroSessions||0)+1; }
          }
          D.skillTodo.stats.totalTime=(D.skillTodo.stats.totalTime||0)+D.skillTodo.pomodoroMins;
          save();
          showToast('🍅','Session Complete!','Take a 5 min break! 🎉 Sessions: '+(D.skillTodo.completedSessions));
          showTab('skilltodo');
        }
      },1000);
      showTab('skilltodo');
    });
    startB.style.cssText+='background:linear-gradient(135deg,#0f3460,#1976d2);border:none;padding:12px 28px;font-size:14px;';
    ctrlRow.appendChild(startB);
    if(pomodoroLeft<totalSecs){
      const resetB=btn('↺ Reset','btn btn-ghost',()=>{ pomodoroLeft=0; showTab('skilltodo'); });
      ctrlRow.appendChild(resetB);
    }
  } else {
    const pauseB=btn('⏸ Pause','btn btn-ghost',()=>{ clearInterval(pomodoroInterval); pomodoroActive=false; showTab('skilltodo'); });
    const stopB=btn('⏹ Stop','btn btn-danger',()=>{ clearInterval(pomodoroInterval); pomodoroActive=false; pomodoroLeft=0; showTab('skilltodo'); });
    ctrlRow.appendChild(pauseB); ctrlRow.appendChild(stopB);
  }
  timerCard.appendChild(ctrlRow);
  root.appendChild(timerCard);

  // Tips
  const tips=el('div','todo-card');
  tips.innerHTML=`<div style="font-size:11px;font-weight:800;color:#0f3460;margin-bottom:8px;">💡 Pomodoro Tips</div>
    ${['25 min focus + 5 min break = 1 Pomodoro 🍅','4 sessions ke baad 15-20 min long break lo','Phone silent karo — ek kaam pe full focus karo','Har session ke baad ek ✅ check karo apne task mein'].map(t=>`<div style="font-size:11px;color:#555;margin-bottom:5px;display:flex;gap:6px;"><span style="color:#1976d2;">▸</span><span>${t}</span></div>`).join('')}`;
  root.appendChild(tips);
}

          if(!t.pomodoroSessions) t.pomodoroSessions=0;
          D.skillTodo.tasks.push(t);
        });
        save();
        showToast('📝','Tasks Added!',parsed.length+' tasks added to your list!');
        todoSubTab='tasks'; showTab('skilltodo');
      });
      addAllBtn.style.cssText+='background:linear-gradient(135deg,#0f3460,#1976d2);border:none;';
      resCard2.appendChild(addAllBtn);

    } catch(e5) {

    }
    genBtn2.disabled=false; genBtn2.innerHTML='🔄 Re-generate';
  });
  genBtn2.style.cssText+='background:linear-gradient(135deg,#0f3460,#1976d2);border:none;margin-top:10px;';
  if(!hasKey){ genBtn2.disabled=true; genBtn2.style.opacity='0.5'; }

  fc.appendChild(sl2); fc.appendChild(skillSel); fc.appendChild(customRow); fc.appendChild(row2); fc.appendChild(genBtn2);
  root.appendChild(fc);
  root.appendChild(resultBox2);
}

// ── STATS TAB ─────────────────────────────────────
function renderTodoStats(root) {
  const tasks=D.skillTodo.tasks;
  const stats=D.skillTodo.stats||{};
  const done=tasks.filter(t=>t.done).length;
  const total=tasks.length;
  const bySkill={};
  tasks.forEach(t=>{ if(t.skill){ if(!bySkill[t.skill]) bySkill[t.skill]={total:0,done:0}; bySkill[t.skill].total++; if(t.done) bySkill[t.skill].done++; } });
  const byPri={high:{t:0,d:0},medium:{t:0,d:0},low:{t:0,d:0}};
  tasks.forEach(t=>{ const p=t.priority||'low'; if(!byPri[p]) byPri[p]={t:0,d:0}; byPri[p].t++; if(t.done) byPri[p].d++; });
  const totalPomoMins=D.skillTodo.stats.totalTime||0;

  // Overview
  const oc=el('div','todo-card');
  oc.style.borderLeft='4px solid #1976d2';
  oc.innerHTML=`<div style="font-size:12px;font-weight:800;color:#0f3460;margin-bottom:12px;">📊 Overall Stats</div>`;
  const og=el('div',''); og.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;';
  [['✅ Tasks Done',done+'/'+total,'#0f3460'],
   ['⏱ Focus Time',totalPomoMins+'m','#1976d2'],
   ['🍅 Pomodoros',(D.skillTodo.completedSessions||0),'#cc2222'],
   ['🔥 Streak',(stats.streak||0)+'d','#cc7700']
  ].forEach(([l,v,c])=>{
    const b=el('div','goal-metric-box'); b.style.cssText='background:#f0f4ff;border:1.5px solid #c5d8ff;border-radius:10px;padding:10px;text-align:center;';
    b.innerHTML=`<div style="font-size:9px;color:#888;font-weight:700;">${l}</div><div style="font-size:16px;font-weight:900;color:${c};">${v}</div>`;
    og.appendChild(b);
  });
  oc.appendChild(og); root.appendChild(oc);

  // By Skill
  if(Object.keys(bySkill).length){
    const sc3=el('div','todo-card'); sc3.style.borderLeft='4px solid #64b5f6';
    sc3.innerHTML=`<div style="font-size:12px;font-weight:800;color:#0f3460;margin-bottom:12px;">🧠 Skill-wise Progress</div>`;
    Object.entries(bySkill).forEach(([skill,v2])=>{
      const pct2=Math.round(v2.done/v2.total*100);
      const row3=el('div',''); row3.style.cssText='margin-bottom:10px;';
      row3.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:12px;font-weight:700;">${skill}</span><span style="font-size:12px;font-weight:800;color:#0f3460;">${v2.done}/${v2.total} (${pct2}%)</span></div>`;
      const pb4=el('div','progress-bar'); const pf4=el('div','progress-fill');
      pf4.style.cssText=`width:${pct2}%;background:linear-gradient(90deg,#64b5f6,#0f3460);`;
      pb4.appendChild(pf4); row3.appendChild(pb4); sc3.appendChild(row3);
    });
    root.appendChild(sc3);
  }

  // By Priority
  const pc3=el('div','todo-card'); pc3.style.borderLeft='4px solid #cc7700';
  pc3.innerHTML=`<div style="font-size:12px;font-weight:800;color:#0f3460;margin-bottom:12px;">⭐ Priority Breakdown</div>`;
  [{p:'high',l:'🔴 High',c:'#cc2222'},{p:'medium',l:'🟡 Medium',c:'#cc7700'},{p:'low',l:'🟢 Low',c:'#007733'}].forEach(({p,l,c})=>{
    const v3=byPri[p]||{t:0,d:0}; if(!v3.t) return;
    const pct3=Math.round(v3.d/v3.t*100);
    const row4=el('div',''); row4.style.cssText='margin-bottom:9px;';
    row4.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:12px;font-weight:700;color:${c};">${l}</span><span style="font-size:12px;font-weight:800;">${v3.d}/${v3.t} (${pct3}%)</span></div>`;
    const pb5=el('div','progress-bar'); const pf5=el('div','progress-fill');
    pf5.style.cssText=`width:${pct3}%;background:${c};`; pb5.appendChild(pf5); row4.appendChild(pb5); pc3.appendChild(row4);
  });
  root.appendChild(pc3);
}

// MOOD TRACKER
// ═══════════════════════════════════════════════════
function renderMood(root) {
  if (!D.mood) D.mood = { entries: {} };
  const tk = new Date().toISOString().split('T')[0];
  const moods = [
    { v:5, emoji:'😄', label:'Amazing',  color:'#00b894' },
    { v:4, emoji:'🙂', label:'Good',     color:'#00cec9' },
    { v:3, emoji:'😐', label:'Okay',     color:'#fdcb6e' },
    { v:2, emoji:'😔', label:'Low',      color:'#e17055' },
    { v:1, emoji:'😞', label:'Bad',      color:'#cc2222' },
  ];
  const todayMood = D.mood.entries[tk];

  // Hero
  const hero = el('div','');
  hero.style.cssText = 'background:linear-gradient(135deg,#6c63ff,#a855f7);border-radius:16px;padding:16px;margin-bottom:14px;';
  const moodList = Object.values(D.mood.entries);
  const avgMood = moodList.length ? (moodList.reduce((s,e)=>s+(e.value||3),0)/moodList.length).toFixed(1) : '—';
  const todayM = moods.find(m=>m.v===(todayMood&&todayMood.value));
  hero.innerHTML = `
    <div style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:700;letter-spacing:0.08em;">MOOD TRACKER</div>
    <div style="display:flex;align-items:center;gap:14px;margin-top:8px;">
      <div style="font-size:48px;">${todayM?todayM.emoji:'🌡️'}</div>
      <div>
        <div style="font-size:18px;font-weight:900;color:#fff;">${todayM?todayM.label:'Not logged yet'}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.6);">Today · Avg mood: ${avgMood}/5 · ${moodList.length} entries</div>
      </div>
    </div>`;
  root.appendChild(hero);

  // Today's mood picker
  const pc = card();
  pc.innerHTML = '<div class="card-title" style="margin-bottom:14px;">🌡️ How are you feeling today?</div>';
  const moodRow = el('div',''); moodRow.style.cssText='display:flex;justify-content:space-around;margin-bottom:14px;';
  moods.forEach(m=>{
    const mb = el('button','mood-btn'+(todayMood&&todayMood.value===m.v?' selected':''));
    mb.style.cssText = `border-radius:14px;border:3px solid ${todayMood&&todayMood.value===m.v?m.color:'var(--border)'};cursor:pointer;padding:10px 8px;background:${todayMood&&todayMood.value===m.v?m.color+'22':'var(--grey1)'};display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.2s;min-width:58px;`;
    mb.innerHTML = `<div style="font-size:30px;">${m.emoji}</div><div style="font-size:9px;font-weight:800;color:${m.color};">${m.label}</div>`;
    mb.onclick = ()=>{
      if (!D.mood) D.mood={entries:{}};
      const alreadySet = D.mood.entries[tk]&&D.mood.entries[tk].value===m.v;
      if (!alreadySet) {
        D.mood.entries[tk] = { value:m.v, emoji:m.emoji, label:m.label, note:D.mood.entries[tk]&&D.mood.entries[tk].note||'' };
        if (!D.gamification) D.gamification={xp:0,level:1,totalXp:0,badges:[],stats:{}};
        D.gamification.stats = D.gamification.stats||{};
        D.gamification.stats.moodLogs = (D.gamification.stats.moodLogs||0)+1;
        addXP(5, 'Mood logged 🌡️');
        showToast(m.emoji,'Mood Logged!', m.label+' — Keep tracking!');
      }
      save(); showTab('mood');
    };
    moodRow.appendChild(mb);
  });
  pc.appendChild(moodRow);
  // Note
  const noteLbl = el('label','field-label'); noteLbl.textContent='📝 Today\'s note (optional)';
  const noteInp = document.createElement('textarea');
  noteInp.placeholder='Aaj kaisa feel kiya? Kya hua...';
  noteInp.style.cssText='width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px;font-size:13px;font-family:inherit;resize:none;min-height:60px;background:var(--input-bg);color:var(--text);';
  noteInp.value = todayMood&&todayMood.note||'';
  noteInp.addEventListener('input',()=>{ if(!D.mood.entries[tk]) D.mood.entries[tk]={value:3}; D.mood.entries[tk].note=noteInp.value; save(); });
  pc.appendChild(noteLbl); pc.appendChild(noteInp);
  root.appendChild(pc);

  // 7-day mood chart
  const wk7=[]; for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);wk7.push(d);}
  const chartCard=card();
  chartCard.innerHTML='<div class="card-title" style="margin-bottom:12px;">📈 Last 7 Days</div>';
  const bc=el('div','bar-chart');
  const days7=['S','M','T','W','T','F','S'];

    const dk=d.toISOString().split('T')[0];

    const val=entry?entry.value:0;
    const mDef=moods.find(m=>m.v===val);

    const bw=el('div','bar-wrap');

    bw.appendChild(bv); bw.appendChild(b); bw.appendChild(bl); bc.appendChild(bw);
  });

  // Recent entries
  const recentCard=card();
  recentCard.innerHTML='<div class="card-title" style="margin-bottom:10px;">📋 Recent Entries</div>';

  if(!entries.length){const e=el('div','');e.style.cssText='color:var(--grey3);font-size:12px;text-align:center;padding:12px;';e.textContent='Aaj se shuru karo!';recentCard.appendChild(e);}
  else entries.forEach(([date,entry])=>{
    const mDef=moods.find(m=>m.v===entry.value);
    const row=el('div',''); row.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);';
    row.innerHTML=`<span style="font-size:22px;">${mDef?mDef.emoji:'😐'}</span>
      <div style="flex:1;"><div style="font-size:12px;font-weight:700;">${mDef?mDef.label:'Unknown'} <span style="font-size:10px;color:var(--grey3);">— ${date}</span></div>
      ${entry.note?`<div style="font-size:11px;color:var(--grey4);margin-top:2px;">${entry.note}</div>`:''}</div>`;
    recentCard.appendChild(row);
  });
  root.appendChild(recentCard);
}

    if(!e2){e2={id:uid(),date:tk,title:'',content:'',mood:3,tags:[]};D.journal.entries.unshift(e2);}

  contentArea.addEventListener('input',()=>{
    let e2=D.journal.entries.find(e3=>e3.date===tk);
    if(!e2){e2={id:uid(),date:tk,title:'',content:'',mood:3,tags:[]};D.journal.entries.unshift(e2);}

  const updateWC=()=>{ const words=(contentArea.value.trim().split(/\s+/).filter(w=>w.length)).length; wc2.textContent=words+' words'; };
  contentArea.addEventListener('input',updateWC); updateWC();
  ec.appendChild(wc2);

  const saveJBtn=btn('💾 Save Entry','btn btn-primary btn-full',()=>{
    if(!contentArea.value.trim()&&!titleInp.value.trim()){showToast('⚠️','Empty!','Kuch to likho!');return;}

    if(!e2){e2={id:uid(),date:tk,title:titleInp.value,content:contentArea.value,mood:3,tags:[]};D.journal.entries.unshift(e2);}
    else{e2.title=titleInp.value;e2.content=contentArea.value;}

    D.gamification.stats=D.gamification.stats||{};

    addXP(15,'Journal entry 📖');
    save(); showToast('📖','Journal Saved!','Entry save ho gayi! +15 XP 🎉');
    showTab('journal');

  saveJBtn.style.cssText+='background:linear-gradient(135deg,#2d3561,#c05c7e);border:none;margin-top:10px;';
  ec.appendChild(saveJBtn);
  root.appendChild(ec);

  // Past entries
  const pastEntries=D.journal.entries.filter(e=>e.date!==tk);

    const ph=el('div',''); ph.style.cssText='font-size:10px;font-weight:900;color:var(--grey3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.07em;'; ph.textContent='📚 Past Entries ('+pastEntries.length+')'; root.appendChild(ph);
    pastEntries.slice(0,10).forEach(e=>{
      const ec2=el('div','journal-entry journal-anim');
      const topR=el('div',''); topR.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;';
      const mDef=[{v:5,e:'😄'},{v:4,e:'🙂'},{v:3,e:'😐'},{v:2,e:'😔'},{v:1,e:'😞'}].find(m=>m.v===e.mood);
      topR.innerHTML=`<div><div style="font-size:12px;font-weight:800;color:var(--text);">${e.title||e.date}</div><div style="font-size:10px;color:var(--grey3);">${e.date} ${mDef?mDef.e:''}</div></div>`;
      const delB2=btn('🗑','btn btn-danger btn-small',()=>{if(confirm('Delete entry?')){D.journal.entries=D.journal.entries.filter(x=>x.id!==e.id);save();showTab('journal');}});
      topR.appendChild(delB2); ec2.appendChild(topR);
      if(e.content){const prev=el('div','');prev.style.cssText='font-size:12px;color:var(--grey4);line-height:1.5;';prev.textContent=e.content.slice(0,120)+(e.content.length>120?'...':'');ec2.appendChild(prev);}
      root.appendChild(ec2);
    });
  }
}

    info.innerHTML='✅ Reminders ON — App open rehna chahiye<br><span style="font-size:10px;color:var(--grey3);">Format: 9:00 AM ya 21:30</span>';

  // Quick templates

    {icon:'🏃',title:'Exercise Time',time:'6:00 AM',note:'Workout time!'},
    {icon:'📚',title:'Study Session',time:'8:00 PM',note:'Padhai karo!'},
    {icon:'😴',title:'Sleep Reminder',time:'10:30 PM',note:'So jao — neend zaroori hai'},
    {icon:'🌙',title:'Night Reflection',time:'9:00 PM',note:'Journal likhne ka time!'},
    {icon:'💊',title:'Medicine Time',time:'8:00 AM',note:'Dawai lena mat bhulo!'},
  ];

  const tg=el('div',''); tg.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:7px;';

    const tb2=el('button','');
    tb2.style.cssText='padding:9px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--grey1);cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:7px;transition:all 0.15s;';
    tb2.innerHTML=`<span style="font-size:18px;">${t.icon}</span><div><div style="font-size:11px;font-weight:800;color:var(--text);">${t.title}</div><div style="font-size:9px;color:var(--grey3);">${t.time}</div></div>`;

      const delB3=btn('🗑','btn btn-danger btn-small',()=>{ D.reminders.list.splice(i,1); save(); showTab('reminders'); });
      delB3.style.padding='5px 9px';

function showReminderModal(existing) {
  const isEdit=!!existing;
  const r=isEdit?{...existing}:{id:uid(),icon:'🔔',title:'',time:'',note:'',enabled:true};
  const overlay=el('div','modal-overlay');
  const box=el('div','modal-box');
  box.style.cssText='width:100%;max-width:520px;margin:0 auto;background:var(--card-bg);border-top:3px solid #7b2d8b;border-radius:22px 22px 0 0;padding:20px;max-height:88vh;overflow-y:auto;';
  const mt2=el('div','modal-title'); mt2.style.color='#7b2d8b'; mt2.textContent=isEdit?'✏️ Edit Reminder':'🔔 New Reminder'; box.appendChild(mt2);
  // Emoji
  const emojiGrid2=el('div','emoji-grid');
  ['🔔','💧','🏃','📚','😴','💊','🌙','☀️','🍎','🧘','💪','📖','🎯','⏰','🌟'].forEach(e2=>{ const eb=el('div','emoji-btn'+(e2===r.icon?' selected':'')); eb.textContent=e2; eb.onclick=()=>{ r.icon=e2; emojiGrid2.querySelectorAll('.emoji-btn').forEach(x=>x.classList.remove('selected')); eb.classList.add('selected'); }; emojiGrid2.appendChild(eb); });
  box.appendChild(emojiGrid2);
  // Title
  const tf3=el('div','field-row'); const tl4=el('label','field-label'); tl4.textContent='Reminder Title';
  const ti4=document.createElement('input'); ti4.type='text'; ti4.value=r.title; ti4.placeholder='e.g. Water Break, Exercise Time...';
  ti4.addEventListener('input',()=>r.title=ti4.value);
  tf3.appendChild(tl4); tf3.appendChild(ti4); box.appendChild(tf3);
  // Time
  const timef=el('div','field-row'); const timelbl=el('label','field-label'); timelbl.textContent='⏰ Time';
  const timeInp2=document.createElement('input'); timeInp2.type='time'; timeInp2.value=r.time||'';
  timeInp2.addEventListener('change',()=>{ const [h2,m2]=timeInp2.value.split(':'); const h3=parseInt(h2); r.time=(h3>12?h3-12:h3||12)+':'+m2+' '+(h3>=12?'PM':'AM'); });
  timef.appendChild(timelbl); timef.appendChild(timeInp2); box.appendChild(timef);
  // Note
  const nf2=el('div','field-row'); const nl2=el('label','field-label'); nl2.textContent='📝 Reminder Note';
  const na2=document.createElement('input'); na2.type='text'; na2.value=r.note||''; na2.placeholder='Short message...';
  na2.addEventListener('input',()=>r.note=na2.value);
  nf2.appendChild(nl2); nf2.appendChild(na2); box.appendChild(nf2);
  // Buttons
  const br=el('div',''); br.style.cssText='display:flex;gap:10px;margin-top:18px;';
  const cb3=btn('Cancel','btn btn-ghost flex-1',()=>overlay.remove());
  const sb3=btn(isEdit?'💾 Save':'✅ Add','btn btn-primary flex-2',()=>{
    if(!r.title.trim()||!r.time){showToast('⚠️','Incomplete!','Title aur time dono chahiye.');return;}
    if(!D.reminders.list) D.reminders.list=[];
    if(isEdit){const idx=D.reminders.list.findIndex(x=>x.id===existing.id);if(idx>-1)Object.assign(D.reminders.list[idx],r);}
    else D.reminders.list.push(r);
    addXP(3,'Reminder set 🔔'); save(); overlay.remove(); showTab('reminders');
    showToast(r.icon,isEdit?'Updated!':'Added!',r.title+' — '+r.time);
  });
  sb3.style.cssText+='background:linear-gradient(135deg,#4a0080,#7b2d8b);border:none;';
  br.appendChild(cb3); br.appendChild(sb3); box.appendChild(br);
  overlay.appendChild(box); overlay.onclick=e2=>{if(e2.target===overlay)overlay.remove();}; document.body.appendChild(overlay); ti4.focus();
}

function renderAdmin(root) {
  root.appendChild(sectionHeader('⚙️ Admin Panel', 'Customize & manage your data'));

  // App settings
  const ac = card();
  const at = el('div','card-title'); at.textContent='🎨 App Settings'; ac.appendChild(at);
  ac.appendChild(divider());
  ['App Name:meta.appName','Tagline:meta.tagline','Your Name:meta.userName'].forEach(s => {
    const [label, path] = s.split(':');
    const [obj, key] = path.split('.');
    ac.appendChild(fieldRow(label, null, D[obj][key], label, v => D[obj][key]=v));
  });
  root.appendChild(ac);

  // Quote
  const qc = card();
  const qh = el('div','card-header');
  const qt = el('div','card-title'); qt.textContent='💬 Motivation Quote';
  const qtog = toggle(D.meta.showQuote, v => { D.meta.showQuote=v; save(); });
  qh.appendChild(qt); qh.appendChild(qtog); qc.appendChild(qh);
  qc.appendChild(divider());
  const qta = document.createElement('textarea');
  qta.value=D.meta.quote; qta.placeholder='Enter motivational quote...'; qta.style.minHeight='55px';
  qta.addEventListener('input', () => { D.meta.quote=qta.value; save(); });
  qc.appendChild(qta);
  root.appendChild(qc);

  // ── SECURITY CARD ─────────────────────────────────
  const secc = card();
  secc.style.cssText = 'border:2px solid #1a1a2e;background:linear-gradient(135deg,#f8f8ff,#fff);';
  const sect = el('div','card-title'); sect.textContent = '🔐 App Security & PIN Lock'; secc.appendChild(sect);
  secc.appendChild(divider());

  const secEnabled = isPinSet() && isSecEnabled();

  const secStatus = el('div','');
  secStatus.style.cssText = `padding:11px 13px;border-radius:10px;margin-bottom:14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:10px;${secEnabled?'background:#f0fff4;border:1.5px solid #c3e6cb;color:#007733;':'background:#fff8f0;border:1.5px solid #ffe0b2;color:#cc7700;'}`;
  secStatus.innerHTML = secEnabled
    ? '<span style="font-size:22px;">🔐</span><div><div>PIN Lock ACTIVE hai</div><div style="font-size:10px;font-weight:500;opacity:0.8;margin-top:2px;">App open karte waqt PIN maangta hai</div></div>'
    : '<span style="font-size:22px;">🔓</span><div><div>PIN Lock OFF hai</div><div style="font-size:10px;font-weight:500;opacity:0.8;margin-top:2px;">Neeche PIN set karo app lock karne ke liye</div></div>';
  secc.appendChild(secStatus);

  const secInfo = el('div','');
  secInfo.style.cssText = 'background:#f0f0f0;border-radius:9px;padding:11px 13px;margin-bottom:14px;font-size:11px;line-height:1.8;color:#555;';
  secInfo.innerHTML = `<b style="color:#111;">🔒 Security Features:</b><br>
    ✅ 4-digit PIN — sirf tum open kar sakte ho<br>
    ✅ ${MAX_ATTEMPTS} baar galat PIN → ${LOCK_MINS} min ke liye app freeze<br>
    ✅ Session memory — same session mein dobara PIN nahi maangta<br>
    ✅ PIN securely hashed store hoti hai<br>
    ✅ Keyboard support bhi hai`;
  secc.appendChild(secInfo);

  const secBtns = el('div',''); secBtns.style.cssText = 'display:grid;gap:9px;';

  if (!isPinSet()) {
    const setupBtn = btn('🔐 Set New PIN Lock','btn btn-primary btn-full', ()=>{
      setSession();
      showLock('setup');
    });
    setupBtn.style.cssText += 'background:linear-gradient(135deg,#1a1a2e,#0f3460);border:none;';
    secBtns.appendChild(setupBtn);
  } else {
    // Change PIN
    const changeBtn = btn('🔄 Change PIN','btn btn-ghost btn-full', ()=>{ showLock('change_old'); });
    changeBtn.style.cssText += 'font-weight:800;';
    secBtns.appendChild(changeBtn);

    // Toggle enable/disable
    const toggleRow = el('div','');
    toggleRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:#f5f5f5;border-radius:10px;border:1.5px solid #e0e0e0;';
    const toggleLbl = el('div','');
    toggleLbl.innerHTML = '<div style="font-size:13px;font-weight:700;">PIN Lock Enable</div><div style="font-size:10px;color:#888;margin-top:2px;">Off karne par bhi PIN saved rahega</div>';
    const togEl = toggle(secEnabled, v => {
      localStorage.setItem(SEC_ON, v ? 'true' : 'false');
      showToast(v?'🔐':'🔓', v?'PIN Lock ON!':'PIN Lock OFF', v?'App ab protected hai!':'Lock disabled.');
      showTab('admin');
    });
    toggleRow.appendChild(toggleLbl); toggleRow.appendChild(togEl);
    secBtns.appendChild(toggleRow);

    // Remove PIN
    const removeBtn = btn('🗑 Remove PIN Lock','btn btn-danger btn-full', ()=>{
      if(confirm('PIN lock remove karna chahte ho? App unprotected ho jaayega!')) {
        showLock('change_old');
        setTimeout(()=>{ pinMode = 'remove_verify'; document.getElementById('lock-sub').textContent = 'ENTER CURRENT PIN TO REMOVE'; },50);
      }
    });
    secBtns.appendChild(removeBtn);
  }
  secc.appendChild(secBtns);
  root.appendChild(secc);

  // ── PATTERN LOCK CARD ──────────────────────────────
  const patc = card();
  patc.style.cssText = 'border:2px solid #0f3460;background:linear-gradient(135deg,#f0f4ff,#fff);';
  const patt = el('div','card-title'); patt.textContent = '🔷 Pattern Lock'; patc.appendChild(patt);
  patc.appendChild(divider());
  const patEnabled = isPatternSet() && isPatternEnabled();
  const patStatus = el('div','');
  patStatus.style.cssText = `padding:11px 13px;border-radius:10px;margin-bottom:14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:10px;${patEnabled?'background:#f0fff4;border:1.5px solid #c3e6cb;color:#007733;':'background:#f0f4ff;border:1.5px solid #c5d8ff;color:#0f3460;'}`;
  patStatus.innerHTML = patEnabled ? '<span style="font-size:22px;">🔷</span><div><div>Pattern Lock ACTIVE</div><div style="font-size:10px;font-weight:500;opacity:0.8;margin-top:2px;">App open karte waqt pattern draw karna hoga</div></div>' : '<span style="font-size:22px;">⬜</span><div><div>Pattern Lock OFF</div><div style="font-size:10px;font-weight:500;opacity:0.8;margin-top:2px;">Neeche set karo — PIN se better security!</div></div>';
  patc.appendChild(patStatus);
  const patInfo = el('div',''); patInfo.style.cssText='background:#f0f4ff;border-radius:9px;padding:10px 13px;margin-bottom:14px;font-size:11px;line-height:1.7;color:#0f3460;'; patInfo.innerHTML='✅ 3×3 grid — draw karo apna pattern<br>✅ Min 4 dots connect karna zaroori hai<br>✅ PIN lock se alag — dono use kar sakte ho<br>✅ Admin tab bhi pattern se protected hoga';
  patc.appendChild(patInfo);
  const patBtns = el('div',''); patBtns.style.cssText='display:grid;gap:9px;';
  if(!isPatternSet()){
    const patSetBtn=btn('🔷 Set Pattern Lock','btn btn-primary btn-full',()=>{ setSession(); showPatternLock('setup'); });
    patSetBtn.style.cssText+='background:linear-gradient(135deg,#0f3460,#1976d2);border:none;';
    patBtns.appendChild(patSetBtn);
  } else {
    const patChgBtn=btn('🔄 Change Pattern','btn btn-ghost btn-full',()=>showPatternLock('change_old')); patBtns.appendChild(patChgBtn);
    const patTogRow=el('div',''); patTogRow.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--grey1);border-radius:10px;border:1.5px solid var(--border);';
    const patTogLbl=el('div',''); patTogLbl.innerHTML='<div style="font-size:13px;font-weight:700;">Pattern Lock Enable</div><div style="font-size:10px;color:var(--grey3);">Toggle karo</div>';
    const patTog=toggle(patEnabled,v=>{ localStorage.setItem(PAT_ON,v?'true':'false'); showToast(v?'🔷':'⬜',v?'Pattern ON!':'Pattern OFF',''); showTab('admin'); });
    patTogRow.appendChild(patTogLbl); patTogRow.appendChild(patTog); patBtns.appendChild(patTogRow);
    const patRemBtn=btn('🗑 Remove Pattern','btn btn-danger btn-full',()=>{ if(confirm('Pattern lock hatana chahte ho?')){ showPatternLock('remove_verify'); } }); patBtns.appendChild(patRemBtn);
  }
  patc.appendChild(patBtns); root.appendChild(patc);

  // ── DARK MODE CARD ─────────────────────────────────
  const dmc = card();
  dmc.style.cssText = 'border:2px solid #1a1a2e;';
  const dmt = el('div','card-title'); dmt.textContent = '🌙 Appearance'; dmc.appendChild(dmt);
  dmc.appendChild(divider());
  const dmRow = el('div',''); dmRow.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:10px 0;';
  const dmLbl = el('div',''); dmLbl.innerHTML='<div style="font-size:13px;font-weight:700;">🌙 Dark Mode</div><div style="font-size:10px;color:var(--grey3);margin-top:2px;">Eyes ke liye comfortable</div>';
  const dmTog = toggle(!!(D.settings&&D.settings.darkMode), ()=>toggleDarkMode());
  dmRow.appendChild(dmLbl); dmRow.appendChild(dmTog); dmc.appendChild(dmRow);
  root.appendChild(dmc);

  // ── PWA INSTALL CARD ───────────────────────────────
  const pwac = card();
  pwac.style.cssText = 'border:2px solid #25D366;background:linear-gradient(135deg,#f0fff4,#fff);';
  const pwat = el('div','card-title'); pwat.textContent = '📱 Install as App (PWA)'; pwac.appendChild(pwat);
  pwac.appendChild(divider());

  const isPWA = window.matchMedia('(display-mode: standalone)').matches ||
                window.navigator.standalone === true;

  if (isPWA) {
    const installed = el('div','');
    installed.style.cssText = 'padding:14px;text-align:center;';
    installed.innerHTML = `
      <div style="font-size:40px;margin-bottom:8px;">✅</div>
      <div style="font-size:14px;font-weight:900;color:#007733;">App Already Installed!</div>
      <div style="font-size:11px;color:#aaa;margin-top:5px;">Tum pehle se PWA mode mein ho 🎉</div>
    `;
    pwac.appendChild(installed);
  } else {
    const pwInfo = el('div','');
    pwInfo.style.cssText = 'background:#f0fff4;border:1px solid #c3e6cb;border-radius:9px;padding:11px 13px;margin-bottom:14px;font-size:12px;line-height:1.8;color:#007733;';
    pwInfo.innerHTML = `
      <b>📱 PWA Kya Milega:</b><br>
      ✅ Home screen pe ⚖️ proper icon<br>
      ✅ Full screen — no browser bar<br>
      ✅ Offline kaam karega<br>
      ✅ Koi third party nahi — 100% secure<br>
      ✅ Bilkul FREE!
    `;
    pwac.appendChild(pwInfo);

    const installBtn2 = btn('📱 Install App Now','btn btn-primary btn-full', ()=>installPWA());
    installBtn2.style.cssText += 'background:linear-gradient(135deg,#25D366,#128C7E);border:none;font-size:14px;padding:14px;margin-bottom:10px;';
    pwac.appendChild(installBtn2);

    const manualBtn = btn('📖 Manual Steps Dekho','btn btn-ghost btn-full', ()=>showPWAInstructions());
    pwac.appendChild(manualBtn);

    // Network status
    const netStatus = el('div','');
    netStatus.style.cssText = `margin-top:10px;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;${navigator.onLine?'background:#f0fff4;color:#007733;':'background:#fff5f5;color:#cc2222;'}`;
    netStatus.textContent = navigator.onLine ? '🌐 Online — App install ho sakti hai!' : '📵 Offline — Internet connect karo pehle';
    pwac.appendChild(netStatus);
  }
  root.appendChild(pwac);
  const aic = card();
  aic.style.border = '2px solid #111';
  aic.style.background = 'linear-gradient(135deg,#f0fff4,#fff)';
  const ait = el('div','card-title'); ait.textContent = '🤖 AI Setup — Google Gemini (Free)'; aic.appendChild(ait);
  aic.appendChild(divider());

  const aiInfo = el('div','');
  aiInfo.style.cssText = 'background:#f0fff4;border:1px solid #c3e6cb;border-radius:9px;padding:11px 13px;margin-bottom:14px;font-size:12px;line-height:1.8;';
  aiInfo.innerHTML = `
    <div style="font-size:13px;font-weight:800;margin-bottom:4px;color:#007733;">🆓 Google Gemini — Free API</div>
    <div>✅ <b>Cost:</b> Bilkul FREE (1500 requests/day)</div>
    <div>✅ <b>Key milegi:</b> <b>aistudio.google.com</b></div>
    <div>✅ <b>Steps:</b> Google account → Get API Key → Copy karo</div>
    <div>✅ <b>Key format:</b> AIza... se shuru hoti hai</div>
    <div style="margin-top:6px;color:#555;">🔒 Key sirf aapke phone mein save hoti hai — server pe nahi jaati</div>
  `;
  aic.appendChild(aiInfo);

  // Key status badge
  const keyStatus = el('div','');
  keyStatus.style.cssText = `margin-bottom:10px;padding:8px 12px;border-radius:9px;font-size:12px;font-weight:700;text-align:center;${getAIKey()?'background:#f0fff4;color:#007733;border:1.5px solid #c3e6cb;':'background:#fff8f0;color:#cc7700;border:1.5px solid #ffe0b2;'}`;
  keyStatus.textContent = getAIKey() ? '✅ Gemini API Key saved — AI ready!' : '⚠️ No API key — AI features need setup';
  aic.appendChild(keyStatus);

  const aiKeyRow = el('div','field-row');
  const aiKeyLabel = el('label','field-label'); aiKeyLabel.textContent = '🔑 Gemini API Key (AIza...)';
  const aiKeyInput = document.createElement('input');
  aiKeyInput.type = 'password';
  aiKeyInput.placeholder = 'AIzaSy...';
  aiKeyInput.value = getAIKey();
  aiKeyInput.style.cssText = 'width:100%;background:#f0f0f0;border:1.5px solid #e0e0e0;border-radius:9px;padding:9px 11px;color:#111;font-size:13px;font-family:monospace;outline:none;';
  aiKeyRow.appendChild(aiKeyLabel); aiKeyRow.appendChild(aiKeyInput); aic.appendChild(aiKeyRow);

  const showToggle = btn('👁 Show Key','btn btn-ghost btn-small', () => {
    aiKeyInput.type = aiKeyInput.type === 'password' ? 'text' : 'password';
    showToggle.innerHTML = aiKeyInput.type === 'password' ? '👁 Show Key' : '🙈 Hide Key';
  });
  showToggle.style.marginBottom = '10px';
  aic.appendChild(showToggle);

  const aiSaveRow = el('div',''); aiSaveRow.style.cssText='display:flex;gap:8px;';
  const aiSaveBtn = btn('💾 Save API Key','btn btn-primary', () => {
    const k = aiKeyInput.value.trim();
    if (!k) { showToast('⚠️','Empty Key','Gemini API key enter karo.'); return; }
    if (!k.startsWith('AIza')) { showToast('⚠️','Invalid Key','Gemini key AIza... se shuru hoti hai.'); return; }
    setAIKey(k);
    showToast('✅','API Key Saved!','Gemini AI ready! 🤖 AI tab aur Skills News use karo.');
    showTab('admin');
  });
  const aiClearBtn = btn('🗑 Clear','btn btn-danger btn-small', () => {
    if (confirm('API key delete karein?')) {
      localStorage.removeItem(AI_KEY);
      aiKeyInput.value = '';
      showToast('🗑','Key Removed','Gemini API key cleared.');
      showTab('admin');
    }
  });
  aiSaveRow.appendChild(aiSaveBtn); aiSaveRow.appendChild(aiClearBtn);
  aic.appendChild(aiSaveRow);

  // Test button
  const testBtn = btn('🧪 Test Connection','btn btn-ghost btn-full', async () => {
    const k = aiKeyInput.value.trim() || getAIKey();
    if (!k) { showToast('⚠️','No Key','Pehle key enter karo.'); return; }
    testBtn.disabled=true; testBtn.innerHTML='⏳ Testing...';
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${getAIModel()}:generateContent?key=${k}`,
        { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ contents:[{parts:[{text:'Say: API working!'}]}], generationConfig:{maxOutputTokens:20} }) });
      if (res.ok) { showToast('✅','Connected!','Gemini API perfectly kaam kar raha hai! 🎉'); }
      else { const e=await res.json(); showToast('❌','Failed',e.error?.message||'Error'); }
    } catch(e) { showToast('❌','Network Error',e.message); }
    testBtn.disabled=false; testBtn.innerHTML='🧪 Test Connection';
  });
  testBtn.style.marginTop='10px';
  aic.appendChild(testBtn);

  // ── Model Selector ──────────────────────────────
  aic.appendChild(divider());
  const modelTitle = el('div','field-label'); modelTitle.textContent = '🧠 Gemini Model Select Karo';
  modelTitle.style.cssText = 'font-size:11px;font-weight:800;color:#555;margin-bottom:8px;display:block;';
  aic.appendChild(modelTitle);

  const models = [
    // ── 2.5 Series ──
    { id:'gemini-2.5-pro',              label:'💎 Gemini 2.5 Pro',              tag:'PAID',    desc:'Most powerful reasoning model',          tagColor:'#cc0000',  group:'2.5 Series' },
    { id:'gemini-2.5-pro-exp-03-25',    label:'🔬 Gemini 2.5 Pro Exp (03-25)',  tag:'FREE*',   desc:'Experimental 2.5 Pro — free trial',       tagColor:'#cc7700',  group:'2.5 Series' },
    { id:'gemini-2.5-flash',            label:'⚡ Gemini 2.5 Flash',            tag:'FREE ✅', desc:'Fast 2.5 — best free pick!',             tagColor:'#007733',  group:'2.5 Series' },
    { id:'gemini-2.5-flash-preview-04-17', label:'🧪 Gemini 2.5 Flash Preview', tag:'FREE*',   desc:'Latest preview build of 2.5 Flash',       tagColor:'#cc7700',  group:'2.5 Series' },
    // ── 2.0 Series ──
    { id:'gemini-2.0-flash-lite',       label:'⚡ Gemini 2.0 Flash Lite',       tag:'FREE ✅', desc:'India free tier pe best kaam karta hai',  tagColor:'#007733',  group:'2.0 Series' },
    { id:'gemini-2.0-flash',            label:'🚀 Gemini 2.0 Flash',            tag:'FREE*',   desc:'Fast but India mein limit ho sakta hai',  tagColor:'#cc7700',  group:'2.0 Series' },
    { id:'gemini-2.0-pro-exp',          label:'🔬 Gemini 2.0 Pro Exp',          tag:'FREE*',   desc:'Experimental, limited access',            tagColor:'#cc7700',  group:'2.0 Series' },
    // ── 1.5 Series ──
    { id:'gemini-1.5-flash-8b',         label:'🪶 Gemini 1.5 Flash 8B',         tag:'FREE ✅', desc:'Lightest model — very fast',              tagColor:'#007733',  group:'1.5 Series' },
    { id:'gemini-1.5-flash',            label:'🌀 Gemini 1.5 Flash',            tag:'FREE ✅', desc:'Reliable free tier model',                tagColor:'#007733',  group:'1.5 Series' },
    { id:'gemini-1.5-pro',              label:'💼 Gemini 1.5 Pro',              tag:'PAID',    desc:'Powerful but paid only',                  tagColor:'#cc0000',  group:'1.5 Series' },
  ];

  const currentModel = getAIModel();
  let lastGroup = '';
  models.forEach(m => {
    // Group header
    if (m.group !== lastGroup) {
      lastGroup = m.group;
      const grpHdr = el('div','');
      grpHdr.style.cssText = 'font-size:10px;font-weight:900;color:#fff;background:#111;border-radius:20px;padding:3px 10px;display:inline-block;margin:8px 0 6px;letter-spacing:0.06em;text-transform:uppercase;';
      grpHdr.textContent = '── ' + m.group + ' ──';
      aic.appendChild(grpHdr);
    }

    const row = el('div','');
    const isSelected = currentModel === m.id;
    row.style.cssText = `display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:7px;cursor:pointer;border:2px solid ${isSelected?'#111':'#e0e0e0'};background:${isSelected?'#f0f0f0':'#fafafa'};transition:all 0.18s;`;
    row.innerHTML = `
      <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${isSelected?'#111':'#ccc'};background:${isSelected?'#111':'#fff'};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
        ${isSelected?'<div style="width:8px;height:8px;border-radius:50%;background:#fff;"></div>':''}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:800;color:#111;">${m.label} <span style="font-size:9px;font-weight:900;color:${m.tagColor};background:${m.tagColor}18;border:1px solid ${m.tagColor}44;border-radius:20px;padding:1px 6px;">${m.tag}</span></div>
        <div style="font-size:10px;color:#888;margin-top:1px;">${m.desc}</div>
      </div>
    `;
    row.onclick = () => {
      setAIModel(m.id);
      showToast('🧠', 'Model Changed!', m.label + ' selected — Test karo!');
      showTab('admin');
    };
    aic.appendChild(row);
  });

  const modelNote = el('div','');
  modelNote.style.cssText = 'font-size:10px;color:#aaa;margin-top:6px;padding:8px;background:#f9f9f9;border-radius:8px;line-height:1.6;';
  modelNote.innerHTML = '💡 <b>Tip:</b> Error aaye toh ⚡ Flash Lite try karo — India free tier pe best kaam karta hai.<br>Current: <b style="color:#111;">' + currentModel + '</b>';
  aic.appendChild(modelNote);

  root.appendChild(aic);
  const dc = card();
  dc.style.border='2px solid #111';
  const dct = el('div','card-title'); dct.textContent='📦 Data Management'; dc.appendChild(dct);
  dc.appendChild(divider());

  // Storage info
  const storageInfo = el('div','');
  storageInfo.style.cssText='background:#f0f0f0;border-radius:9px;padding:11px 13px;margin-bottom:14px;font-size:12px;line-height:1.7;';
  storageInfo.innerHTML=`
    <div style="font-size:13px;font-weight:800;margin-bottom:6px;">📱 Data Storage Info</div>
    <div>✅ <b>Where:</b> Your phone/browser's localStorage</div>
    <div>✅ <b>Server:</b> No server — 100% offline on your device</div>
    <div>✅ <b>Internet:</b> Not required to use this app</div>
    <div>⚠️ <b>Note:</b> Clearing browser data will delete app data — use Export to backup!</div>
  `;
  dc.appendChild(storageInfo);

  // Export section
  const et = el('div','field-label'); et.textContent='📤 Export Your Data'; et.style.marginBottom='8px'; dc.appendChild(et);
  const erow = el('div','export-row');

  // JSON Export
  const ejb = btn('⬇ Export JSON','btn btn-primary', () => {
    const blob = new Blob([JSON.stringify(D, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`WorkLifeBalance_${new Date().toISOString().split('T')[0]}.json`; a.click();
    URL.revokeObjectURL(url);
    showToast('📦','Data Exported!','JSON file downloaded to your device.');
  });
  ejb.style.flex='1';

  // CSV Export (money data)
  const ecb = btn('⬇ Export CSV','btn btn-ghost', () => {
    let csv = 'Type,Label,Amount\n';
    D.money.income.forEach(i => csv += `Income,"${i.label}",${i.amount}\n`);
    D.money.expense.forEach(e => csv += `Expense,"${e.label}",${e.amount}\n`);
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`WLB_Money_${new Date().toISOString().split('T')[0]}.csv`; a.click();
    URL.revokeObjectURL(url);
    showToast('📊','CSV Exported!','Money data saved as Excel-compatible CSV.');
  });
  ecb.style.flex='1';

  erow.appendChild(ejb); erow.appendChild(ecb); dc.appendChild(erow);
  dc.appendChild(el('div','divider'));

  // Import section
  const it2 = el('div','field-label'); it2.textContent='📥 Import Data (from JSON backup)'; it2.style.cssText='display:block;margin:10px 0 6px;';
  dc.appendChild(it2);
  const fi = document.createElement('input'); fi.type='file'; fi.accept='.json'; fi.style.display='none';
  fi.addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (confirm('This will replace all current data with the imported file. Continue?')) {
          D = deepMerge(JSON.parse(JSON.stringify(defaults)), parsed);
          localStorage.setItem(KEY, JSON.stringify(D));
          showToast('✅','Data Imported!','Your backup has been restored.');
          showTab('home');
        }
      } catch { alert('Invalid JSON file. Please use a file exported from this app.'); }
    };
    reader.readAsText(file);
  });
  dc.appendChild(fi);

  const importBtn = btn('⬆ Import JSON','btn btn-ghost btn-full', () => fi.click());
  dc.appendChild(importBtn);

  // Open in Excel tip
  const tip = el('div','');
  tip.style.cssText='background:#f9f9f0;border:1px solid #ddd;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11px;color:#555;line-height:1.6;';
  tip.innerHTML=`<b>💡 Excel mein kaise open karein:</b><br>1. Export CSV click karo<br>2. Phone se PC pe transfer karo<br>3. CSV file ko Excel/Google Sheets mein open karo`;
  dc.appendChild(tip);

  dc.appendChild(divider());

  // Reset
  const rb2 = btn('⚠️ Reset All Data','btn btn-danger btn-full', () => {
    if (confirm('This will permanently delete ALL your data. Are you sure?')) {
      localStorage.removeItem(KEY);
      D = JSON.parse(JSON.stringify(defaults));
      showToast('🗑','Data Reset','All data cleared.'); showTab('home');
    }
  });
  dc.appendChild(rb2);
  root.appendChild(dc);
}

// ═══════════════════════════════════════════════════
// AI CHAT
// ═══════════════════════════════════════════════════
let aiMessages = []; // in-memory chat history

async function callClaude(userMsg) {
  const systemPrompt = `You are a personal life assistant for ${D.meta.userName}. Help them with work-life balance, goals, habits, finances, and productivity. Keep responses concise and motivating. Speak in a friendly Hindi-English mix if they use it. Their current data summary: Habits: ${D.habits.list.map(h=>h.name+(h.done?' ✓':'')).join(', ')}. Skills: ${[...D.skills.apps,...D.skills.websites,...D.skills.others].map(s=>s.name+' '+s.progress+'%').join(', ')}.`;
  aiMessages.push({ role:'user', content: userMsg });
  try {
    const reply = await callGemini(aiMessages, systemPrompt);
    aiMessages.push({ role:'assistant', content: reply });
    return reply;
  } catch(e) {
    aiMessages.pop();
    throw e;
  }
}

function renderAI(root) {
  const hasKey = !!getAIKey();

  // Header
  root.appendChild(sectionHeader('🤖 AI Assistant', 'Powered by Google Gemini (Free)'));

  if (!hasKey) {
    const noKey = card();
    noKey.style.cssText = 'text-align:center;padding:28px 18px;';
    noKey.innerHTML = `
      <div style="font-size:40px;margin-bottom:12px;">🔑</div>
      <div style="font-size:16px;font-weight:900;margin-bottom:6px;">Gemini API Key Setup Karo</div>
      <div style="font-size:12px;color:#888;margin-bottom:18px;">Admin panel mein <b>Free Gemini API key</b> save karo — bilkul free hai!</div>
    `;
    const goAdmin = btn('⚙️ Go to Admin Setup','btn btn-primary btn-full', () => showTab('admin'));
    noKey.appendChild(goAdmin);
    root.appendChild(noKey);
    return;
  }

  // Quick prompt chips
  const chipCard = card();
  chipCard.style.paddingBottom = '6px';
  const chipTitle = el('div','field-label'); chipTitle.textContent = '💡 Quick Ask'; chipTitle.style.marginBottom='8px';
  chipCard.appendChild(chipTitle);
  const chipRow = el('div',''); chipRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;';
  ['📊 My progress review','💰 Budgeting tips','🎯 Goal advice','⚡ Productivity hack','🧘 Work-life balance'].forEach(q => {
    const chip = el('button','');
    chip.textContent = q;
    chip.style.cssText = 'background:#f0f0f0;border:1.5px solid #ddd;border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;color:#111;font-family:inherit;';
    chip.onclick = () => { userInput.value = q; userInput.focus(); };
    chipRow.appendChild(chip);
  });
  chipCard.appendChild(chipRow);
  root.appendChild(chipCard);

  // Chat container
  const chatWrap = card();
  chatWrap.style.cssText = 'padding:0;overflow:hidden;';
  const chatBox = el('div','');
  chatBox.style.cssText = 'height:320px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#fafafa;';
  chatBox.id = 'ai-chat-box';

  // Render existing messages
  function renderMessages() {
    chatBox.innerHTML = '';
    if (!aiMessages.length) {
      const welcome = el('div','');
      welcome.style.cssText = 'text-align:center;color:#aaa;font-size:12px;padding:40px 16px;';
      welcome.innerHTML = `<div style="font-size:32px;margin-bottom:8px;">🤖</div>Namaste ${D.meta.userName}! Main Gemini AI hoon.<br><span style="font-size:10px;">Habits, goals, money, skills — kuch bhi pucho!</span>`;
      chatBox.appendChild(welcome);
    } else {
      aiMessages.forEach(m => {
        const bubble = el('div','');
        const isUser = m.role === 'user';
        bubble.style.cssText = `max-width:85%;padding:10px 13px;border-radius:${isUser?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:13px;line-height:1.5;word-wrap:break-word;align-self:${isUser?'flex-end':'flex-start'};background:${isUser?'#111':'#fff'};color:${isUser?'#fff':'#111'};border:${isUser?'none':'1.5px solid #e0e0e0'};box-shadow:0 2px 8px rgba(0,0,0,0.08);`;
        bubble.textContent = m.content;
        chatBox.appendChild(bubble);
      });
    }
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  renderMessages();
  chatWrap.appendChild(chatBox);

  // Input row
  const inputRow = el('div','');
  inputRow.style.cssText = 'display:flex;gap:8px;padding:10px 12px;border-top:1.5px solid #e0e0e0;background:#fff;align-items:flex-end;';
  const userInput = document.createElement('textarea');
  userInput.placeholder = 'Apna sawaal likho...';
  userInput.style.cssText = 'flex:1;border:1.5px solid #e0e0e0;border-radius:10px;padding:9px 11px;font-size:13px;font-family:inherit;resize:none;min-height:40px;max-height:100px;outline:none;background:#f7f7f7;';
  userInput.rows = 1;
  userInput.addEventListener('input', () => { userInput.style.height='auto'; userInput.style.height=Math.min(userInput.scrollHeight,100)+'px'; });

  const sendBtn = el('button','');
  sendBtn.innerHTML = '➤';
  sendBtn.style.cssText = 'background:#111;color:#fff;border:none;border-radius:10px;width:40px;height:40px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;';

  async function sendMessage() {
    const msg = userInput.value.trim();
    if (!msg) return;
    userInput.value = ''; userInput.style.height='auto';

    // Loading bubble
    renderMessages();
    const loading = el('div','');
    loading.style.cssText = 'max-width:85%;padding:10px 13px;border-radius:14px 14px 14px 4px;font-size:13px;background:#fff;border:1.5px solid #e0e0e0;box-shadow:0 2px 8px rgba(0,0,0,0.08);align-self:flex-start;color:#aaa;';
    loading.textContent = '🤖 Thinking...';
    chatBox.appendChild(loading);
    chatBox.scrollTop = chatBox.scrollHeight;
    sendBtn.disabled = true; sendBtn.style.opacity='0.5';

    try {
      const reply = await callClaude(msg);
      loading.remove();
      renderMessages();
    } catch(e) {
      loading.remove();
      const errMsg = e.message === 'NO_KEY' ? 'API key nahi mili. Admin mein set karo.' : 'Error: ' + e.message;
      aiMessages.pop(); // remove failed user message
      showToast('❌','AI Error', errMsg);
      renderMessages();
    }
    sendBtn.disabled = false; sendBtn.style.opacity='1';
  }

  sendBtn.onclick = sendMessage;
  userInput.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  inputRow.appendChild(userInput); inputRow.appendChild(sendBtn);
  chatWrap.appendChild(inputRow);
  root.appendChild(chatWrap);

  // Clear chat button
  const clearRow = el('div',''); clearRow.style.cssText='display:flex;justify-content:flex-end;margin-top:-4px;';
  const clearBtn = btn('🗑 Clear Chat','btn btn-ghost btn-small', () => { aiMessages=[]; renderMessages(); });
  clearRow.appendChild(clearBtn); root.appendChild(clearRow);

  // Info note
  const note = el('div','');
  note.style.cssText = 'font-size:10px;color:#aaa;text-align:center;margin-top:8px;padding:0 8px;';
  note.textContent = '🆓 Gemini Free API — 1500 requests/day. Messages not saved after refresh. Key safe on device.';
  root.appendChild(note);
}


function sectionHeader(title, sub) {
  const wrap = el('div','');
  const t = el('div','section-title'); t.textContent=title;
  const s = el('div','section-sub'); s.textContent=sub;
  wrap.appendChild(t); wrap.appendChild(s);
  return wrap;
}

function showAddFieldModal(onAdd) {
  const emojis = ['✨','🎯','⚡','🔥','💡','📌','🏆','🌟','💎','🚀','📝','🎵','🌙','☀️','💻'];
  let selectedEmoji = '✨';
  const overlay = el('div','modal-overlay');
  const box = el('div','modal-box');
  box.innerHTML = `<div class="modal-title">➕ Add Custom Field</div>`;
  const eg = el('div','emoji-grid');
  emojis.forEach(e => {
    const eb = el('div','emoji-btn'+(e===selectedEmoji?' selected':'')); eb.textContent=e;
    eb.onclick = () => {
      selectedEmoji=e;
      eg.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      eb.classList.add('selected');
    };
    eg.appendChild(eb);
  });
  box.appendChild(eg);
  const fr = el('div','field-row');
  const fl = el('label','field-label'); fl.textContent='Field Name';
  const fi2 = document.createElement('input'); fi2.type='text'; fi2.placeholder='e.g. Study Break Time';
  fr.appendChild(fl); fr.appendChild(fi2); box.appendChild(fr);
  const btnrow = el('div',''); btnrow.style.cssText='display:flex;gap:10px;margin-top:16px;';
  const cb = btn('Cancel','btn btn-ghost flex-1', () => overlay.remove());
  const ab2 = btn('Add Field ✓','btn btn-primary flex-2', () => {
    if (fi2.value.trim()) { onAdd({ icon:selectedEmoji, label:fi2.value.trim() }); overlay.remove(); }
  });
  btnrow.appendChild(cb); btnrow.appendChild(ab2);
  box.appendChild(btnrow);
  overlay.appendChild(box);
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
  fi2.focus();
}
